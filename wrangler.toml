name = "seekertracker"
main = ".open-next/worker.js"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = true

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[observability]
enabled = true

# Zone routes (zone DNS stays orange-clouded; Worker intercepts before origin)
[[routes]]
pattern = "seekertracker.com/*"
zone_name = "seekertracker.com"

[[routes]]
pattern = "www.seekertracker.com/*"
zone_name = "seekertracker.com"

[vars]
NEXT_PUBLIC_SITE_URL = "https://seekertracker.com"
